stanowisko:
  nazwa: Specjalista ds. Marketingu
  opis: Szukamy osoby do działu marketingu, która zajmie się kampaniami w mediach
    społecznościowych, content marketingiem i analizą wyników.
wymagania:
  minimalne_lata_doswiadczenia: 2
  umiejetnosci_kluczowe:
  - nazwa: Social media (Facebook, Instagram, LinkedIn)
    waga: 5
  - nazwa: Google Analytics
    waga: 4
  - nazwa: Content marketing / copywriting
    waga: 4
  - nazwa: Adobe Photoshop lub Canva
    waga: 2
  - nazwa: Znajomość angielskiego
    waga: 3
  wyksztalcenie_preferowane:
