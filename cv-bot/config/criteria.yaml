ocena:
  prog_rekomendacji: 65
  tryb_filtrowania: zbalansowany
  wskazowki_dla_ai: Oceniaj przede wszystkim dopasowanie doświadczenia i umiejętności
    do wymagań powyżej. Premiuj konkretne, mierzalne osiągnięcia (np. "zwiększyłem
    zasięgi o 40%") ponad ogólnikowe opisy. Bądź surowy wobec CV bez żadnego doświadczenia
    w branży.
